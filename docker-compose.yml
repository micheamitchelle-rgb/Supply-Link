services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps          # stop at deps stage for dev (no build needed)
    image: supply-link-frontend:dev
    working_dir: /app
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app          # hot-reload: mount source into container
      - /app/node_modules        # keep container node_modules isolated
      - /app/.next               # keep .next cache inside container
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_CONTRACT_ID=${NEXT_PUBLIC_CONTRACT_ID:-CBUWSKT2UGOAXK4ZREVDJV5XHSYB42PZ3CERU2ZFUTUMAZLJEHNZIECA}
      - NEXT_PUBLIC_STELLAR_NETWORK=${NEXT_PUBLIC_STELLAR_NETWORK:-testnet}
    env_file:
      - path: ./frontend/.env.local
        required: false
