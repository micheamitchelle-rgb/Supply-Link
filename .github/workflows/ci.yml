name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract-tests:
    name: Smart Contract Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smart-contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('smart-contract/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run contract linting (clippy)
        working-directory: smart-contract
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check contract formatting
        working-directory: smart-contract
        run: cargo fmt --all -- --check

      - name: Build contract (release WASM)
        working-directory: smart-contract
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run contract tests
        working-directory: smart-contract
        run: cargo test --all --release

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage (threshold 80 %)
        working-directory: smart-contract
        run: bash scripts/coverage.sh

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        working-directory: smart-contract
        run: bash scripts/coverage.sh upload
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Type-check frontend
        run: npx tsc --noEmit

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for committed secrets
        run: bash scripts/check-secrets.sh
